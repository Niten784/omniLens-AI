name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS Profile'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install  --no-package-lock
      
      - name: Setup EAS
        run: npm install -g eas-cli
      
      - name: Login to Expo
        run: eas login --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      
      - name: Build APK
        run: eas build -p android --profile ${{ github.event.inputs.profile }} --non-interactive --wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: omniLens-apk
          path: '*.apk'
